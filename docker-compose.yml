services:
  bind:
    build: ./bind
    container_name: lucos_dns_bind
    ports:
      - "53:53"
      - "53:53/udp"
    image: lucas42/lucos_dns_bind:${VERSION:-latest}
    restart: always
    volumes:
      - "generatedzones:/etc/bind/generated-zones/"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 localhost +short > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  sync:
    build: ./sync
    container_name: lucos_dns_sync
    image: lucas42/lucos_dns_sync:${VERSION:-latest}
    restart: always
    environment:
      - SYSTEM
      - LOGANNE_ENDPOINT
      - SCHEDULE_TRACKER_ENDPOINT
      - CONFIGY_ENDPOINT
      - ZONES_PATH=/etc/bind/generated-zones/
    volumes:
      - "generatedzones:/etc/bind/generated-zones/"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[s]upercronic'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ADR-0011 real-transport test: runs config-sync.py once against real configy/loganne/
  # schedule_tracker endpoints. rndc will fail (no bind server) but subprocess.run has no
  # check=True so the failure is silent — the schedule_tracker emit path is still exercised.
  # Run with: docker compose --profile test run --rm test
  # Requires test credentials in lucos_creds (see PR for provisioning steps).
  test:
    build: ./sync
    container_name: lucos_dns_sync_test
    image: lucas42/lucos_dns_sync:${VERSION:-latest}
    command: ["python", "/app/config-sync.py"]
    environment:
      - SYSTEM
      - LOGANNE_ENDPOINT
      - SCHEDULE_TRACKER_ENDPOINT
      - CONFIGY_ENDPOINT
      - ZONES_PATH=/test-zones/
    volumes:
      - "test-zones:/test-zones/"
    profiles:
      - test

volumes:
  generatedzones:
  # test-zones is only used by the test profile and does not need backup coverage
  test-zones: