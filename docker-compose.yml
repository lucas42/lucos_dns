services:
  bind:
    build: ./bind
    container_name: bind
    ports:
      - "53:53"
      - "53:53/udp"
      - "953:953"
    image: lucas42/lucos_dns_bind
    restart: always
    volumes:
      - "generatedzones:/etc/bind/generated-zones/"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 localhost +short > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  sync:
    build: ./sync
    container_name: lucos_dns_sync
    image: lucas42/lucos_dns_sync
    restart: always
    environment:
      - SYSTEM=lucos_dns_sync
      - LOGANNE_ENDPOINT
      - SCHEDULE_TRACKER_ENDPOINT
      - ZONES_PATH=/etc/bind/generated-zones/
    volumes:
      - "generatedzones:/etc/bind/generated-zones/"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[c]rond'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  generatedzones:
